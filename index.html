<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мероприятия в Тепле</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f5fb;
    --surface: #ffffff;
    --accent: #1a3a8a;
    --accent-mid: #4a6abf;
    --accent-light: #ddeaf8;
    --accent-border: #a8c8ef;
    --text: #0d1f3c;
    --text-muted: #6b87ab;
    --border: #c8ddf0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Jost', system-ui, sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 24px 20px 18px;
    text-align: center;
  }
  .hero-logo {
    width: 160px;
    height: auto;
    display: block;
    margin: 0 auto 10px;
  }
  .hero-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* NAV */
  .nav-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 10px rgba(26,58,138,0.07);
  }
  .month-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
  }
  .year-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    font-weight: 300;
  }
  .nav-buttons { display: flex; gap: 8px; }
  .nav-btn {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 50%; cursor: pointer;
    font-size: 16px; color: var(--accent-mid);
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { background: var(--accent-light); }

  /* WEEKDAYS */
  .weekday-row {
    display: grid; grid-template-columns: repeat(7, 1fr);
    background: var(--surface);
    padding: 8px 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .wd {
    text-align: center; font-size: 10px; font-weight: 500;
    color: var(--text-muted); letter-spacing: 1px;
    text-transform: uppercase; padding-bottom: 8px;
  }
  .wd:nth-child(6), .wd:nth-child(7) { color: var(--accent-mid); }

  /* GRID */
  .calendar-body { padding: 6px 12px 48px; }
  .week-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 4px; }

  .day-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 5px 4px;
    min-height: 64px;
  }
  .day-cell.other-month { background: transparent; border-color: transparent; }
  .day-cell.has-events { background: var(--accent-light); border-color: var(--accent-border); }
  .day-cell.today { border: 2px solid var(--accent); }

  .day-num {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 3px;
  }
  .day-cell.today .day-num { background: var(--accent); color: #fff; }
  .day-cell.has-events .day-num { color: var(--text); }
  .day-cell.other-month .day-num { color: #d0dce8; }

  .event-item { margin-bottom: 3px; }
  .event-time { font-size: 8px; color: var(--accent); font-weight: 500; display: block; line-height: 1.2; }
  .event-name {
    font-size: 9px; color: var(--text); line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .more-label { font-size: 8px; color: var(--text-muted); }

  #status { text-align: center; font-size: 13px; color: var(--text-muted); padding: 32px 16px; }
</style>
</head>
<body>

<div class="hero">
  <!-- Логотип: положи файл logo.png рядом с index.html в репозитории -->
  <img class="hero-logo" src="logo.png" alt="Творческая мастерская Тепло">
  <div class="hero-subtitle">мероприятия</div>
</div>

<div class="nav-bar">
  <div>
    <div class="month-name" id="month-name">Загрузка...</div>
    <div class="year-label" id="year-label"></div>
  </div>
  <div class="nav-buttons">
    <button class="nav-btn" id="prev">&#8592;</button>
    <button class="nav-btn" id="next">&#8594;</button>
  </div>
</div>

<div class="weekday-row">
  <div class="wd">Пн</div><div class="wd">Вт</div><div class="wd">Ср</div>
  <div class="wd">Чт</div><div class="wd">Пт</div><div class="wd">Сб</div><div class="wd">Вс</div>
</div>

<div id="status">Загружаем мероприятия...</div>
<div class="calendar-body" id="calendar-body" style="display:none;"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIrsI_6JOfaElPnletTbYQtX8CxNq33Utke5ln7sybo5YXcE-z8tooUIsddN31LBA9hthgggs6kDlj/pub?gid=820845205&single=true&output=csv';
const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

let events = {};
let currentYear, currentMonth;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = [];
    let cur = '', inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

function parseDate(raw) {
  let m = raw.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  m = raw.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  return null;
}

function formatTime(raw) {
  if (!raw) return '';
  const m = raw.match(/(\d{1,2}):(\d{2})/);
  return m ? `${m[1]}:${m[2]}` : '';
}

async function loadEvents() {
  try {
    const r = await fetch(CSV_URL);
    const text = await r.text();
    const rows = parseCSV(text);
    rows.forEach(cols => {
      const dateRaw = (cols[0] || '').trim();
      const timeRaw = (cols[1] || '').trim();
      const name    = (cols[3] || '').trim();
      if (!dateRaw || !name) return;
      if (!/\d/.test(dateRaw)) return;
      const key = parseDate(dateRaw);
      if (!key) return;
      const time = formatTime(timeRaw);
      if (!events[key]) events[key] = [];
      events[key].push({ time, name });
    });
    document.getElementById('status').style.display = 'none';
    document.getElementById('calendar-body').style.display = 'block';
  } catch(e) {
    document.getElementById('status').textContent = 'Не удалось загрузить данные. Проверьте доступ к таблице.';
  }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('month-name').textContent = MONTHS_RU[currentMonth];
  document.getElementById('year-label').textContent = currentYear;

  const body = document.getElementById('calendar-body');
  body.innerHTML = '';

  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1);
  let dow = firstDay.getDay();
  dow = dow === 0 ? 6 : dow - 1;

  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev  = new Date(currentYear, currentMonth, 0).getDate();

  const cells = [];
  for (let i = dow - 1; i >= 0; i--) cells.push({ day: daysInPrev - i, cur: false });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, cur: true });
  while (cells.length % 7 !== 0) cells.push({ day: cells.length - dow - daysInMonth + 1, cur: false });

  for (let w = 0; w < cells.length / 7; w++) {
    const row = document.createElement('div');
    row.className = 'week-row';
    for (let d = 0; d < 7; d++) {
      const { day, cur } = cells[w * 7 + d];
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (!cur ? ' other-month' : '');

      const key = cur
        ? `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`
        : null;
      const dayEvs = key ? (events[key] || []) : [];

      const isToday = cur
        && today.getFullYear() === currentYear
        && today.getMonth() === currentMonth
        && today.getDate() === day;

      if (isToday) cell.classList.add('today');
      if (cur && dayEvs.length > 0) cell.classList.add('has-events');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = day;
      cell.appendChild(numEl);

      if (cur) {
        const sorted = [...dayEvs].sort((a, b) => a.time.localeCompare(b.time));
        sorted.slice(0, 3).forEach(ev => {
          const item = document.createElement('div');
          item.className = 'event-item';
          if (ev.time) {
            const t = document.createElement('span');
            t.className = 'event-time';
            t.textContent = ev.time;
            item.appendChild(t);
          }
          const n = document.createElement('div');
          n.className = 'event-name';
          n.textContent = ev.name;
          item.appendChild(n);
          cell.appendChild(item);
        });
        if (sorted.length > 3) {
          const more = document.createElement('div');
          more.className = 'more-label';
          more.textContent = `+${sorted.length - 3} ещё`;
          cell.appendChild(more);
        }
      }
      row.appendChild(cell);
    }
    body.appendChild(row);
  }
}

const now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();

document.getElementById('prev').addEventListener('click', () => {
  if (--currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
});
document.getElementById('next').addEventListener('click', () => {
  if (++currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
});

loadEvents();
</script>
</body>
</html>
